# Deploys the site to GitHub Pages.
#
# Needed only when Settings -> Pages -> Source is set to "GitHub Actions".
# In that mode nothing deploys unless a workflow like this exists, which looks
# exactly like a build that never finishes. `enablement: true` also turns Pages
# on if it was never enabled at all.
#
# The site is plain static files at the repo root, so there is nothing to build
# — the whole checkout is uploaded as-is.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:      # lets you re-run it by hand from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Never let two deploys race; queue them instead.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - id: deployment
        uses: actions/deploy-pages@v4
